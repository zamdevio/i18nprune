# knip/madge hygiene on main pushes (non-blocking)
#
# Runs when the default branch changes — same cadence as code that affects
# dependency graphs. Manual re-run: workflow_dispatch.
# Maintainer triage: maintainer/systems/health.md and knip.md.
# Engineering map: maintainer/systems/ci.md

name: Architecture

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  hygiene:
    name: knip + madge
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: knip
        run: pnpm knip
        continue-on-error: true

      - name: madge circular
        run: pnpm madge:circular
        continue-on-error: true

      - name: madge orphans
        run: pnpm madge:orphans
        continue-on-error: true
