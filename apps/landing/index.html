<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>i18nprune — ESLint for i18n</title>
    <meta name="description" content="Production i18n toolkit for validation, sync, generation, and cleanup. Ensure locale health and CI-proof localization." />
    <meta name="color-scheme" content="light dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <meta property="og:type" content="website" />
    <meta property="og:title" content="i18nprune — ESLint for i18n" />
    <meta property="og:description" content="Production i18n toolkit for validation, sync, generation, and cleanup." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="i18nprune — ESLint for i18n" />
    <meta name="twitter:description" content="Production i18n toolkit for validation, sync, generation, and cleanup." />

    <script>
      (function () {
        try {
          var s = localStorage.getItem("i18nprune-theme");
          var dark =
            s === "dark" ||
            (!s && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
