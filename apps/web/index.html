<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>i18nprune Web Runtime</title>
    <meta name="description" content="i18nprune web runtime – powered by @i18nprune/core." />
    <meta name="color-scheme" content="light dark" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="i18nprune Web Runtime" />
    <meta property="og:description" content="i18nprune web runtime using @i18nprune/core." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="i18nprune Web Runtime" />
    <meta name="twitter:description" content="i18nprune web runtime powered by @i18nprune/core." />
  </head>
  <body>
    <script>
      (function () {
        try {
          var key = 'i18nprune-runtime-web-theme';
          var stored = localStorage.getItem(key);
          var dark =
            stored === 'dark' ||
            (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
